services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-draft_plans}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-draft_plans}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-draft_plans}?schema=public
      EXTERNAL_HEROES_URL: ${EXTERNAL_HEROES_URL:-https://api.opendota.com/api/heroStats}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/shared:/workspace/packages/shared
      - ./tsconfig.base.json:/workspace/tsconfig.base.json:ro
      - api-node-modules:/workspace/apps/api/node_modules

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages/shared:/workspace/packages/shared
      - ./tsconfig.base.json:/workspace/tsconfig.base.json:ro
      - web-node-modules:/workspace/apps/web/node_modules

volumes:
  postgres-data:
  api-node-modules:
  web-node-modules:
